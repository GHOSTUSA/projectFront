services:
  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NUXT_HOST=0.0.0.0
      - NUXT_PORT=3000
      - API_URL=http://api:8082
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      - DATABASE_URL=mysql://root:password@mariadb:3306/uber_eats_dev
      - HOST=0.0.0.0
      - PORT=8082
    env_file:
      - ./api/.env
    restart: unless-stopped
    networks:
      - default
      - uber_eats_network
    depends_on:
      - mariadb

  mariadb:
    image: mariadb:11.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: uber_eats_dev
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - uber_eats_network

volumes:
  mariadb_data:

networks:
  uber_eats_network:
